services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
  cps-api:
    build: .
    depends_on:
      - mongo
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/cps
      JWT_SECRET: change-me-change-me-change-me-change-me-1234567890
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
