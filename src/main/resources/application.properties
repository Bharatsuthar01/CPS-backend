spring.application.name=chequebook-printing-system
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

app.security.jwt.secret=${JWT_SECRET:bRC02HPNTsXBZCd0FQ0EZfG87lZwYX28NP6zXaRyVUn}
app.security.jwt.issuer=${JWT_ISSUER:chequebook}
app.security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
app.security.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:2592000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.rate-limit.capacity=${RATE_LIMIT_CAPACITY:100}
app.security.rate-limit.refill-per-minute=${RATE_LIMIT_REFILL_PER_MINUTE:100}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
